name: Configure SMTP
on:
  workflow_dispatch:
jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check and configure SMTP
        run: |
          echo "=== Current SMTP config ==="
          CURRENT=$(curl -s "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/config/auth" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}")
          echo "Current: $CURRENT"
          
          SMTP_HOST=$(echo "$CURRENT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('smtp_host','') or '')")
          SMTP_PORT=$(echo "$CURRENT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('smtp_port','') or '')")
          echo "SMTP_HOST=$SMTP_HOST"
          echo "SMTP_PORT=$SMTP_PORT"
          
          if [ -z "$SMTP_HOST" ]; then
            echo "=== SMTP not configured, configuring now ==="
            # Configure SMTP via the SMTP config endpoint
            SMTP_RESP=$(curl -s -X POST \
              "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/config/smtp" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
              -H "Content-Type: application/json" \
              -d '{
                "host": "smtp.resend.com",
                "port": 587,
                "user": "resend",
                "password": "re_fRYASk3f_BdRNVH2yoW7v3UVvU6BphqTW",
                "sender_email": "noreply@mi-to-ai.com",
                "sender_name": "MI TO AI"
              }')
            echo "SMTP config response: $SMTP_RESP"
          else
            echo "SMTP already configured, skipping"
          fi
          
          echo "=== Final SMTP config ==="
          FINAL=$(curl -s "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/config/auth" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}")
          echo "Final: $FINAL"
