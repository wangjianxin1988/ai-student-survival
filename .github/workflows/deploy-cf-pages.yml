name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_PROJECT_NAME: ai-student-survival

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Clear build cache
        run: rm -rf .astro .vite dist node_modules/.vite

      - name: Build
        run: pnpm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.PUBLIC_TURNSTILE_SITE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FORCE_DEMO_AUTH: ${{ vars.FORCE_DEMO_AUTH || 'false' }}

      - name: Upload to Cloudflare Pages
        run: |
          echo "Uploading build to Cloudflare Pages..."
          pnpm exec wrangler pages publish dist --project-name=ai-student-survival --branch=production --commit-message="${{ github.sha }}" 2>&1 | tee /tmp/wrangler.log
          echo "upload_done=true" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Update production deployment and purge cache
        run: |
          echo "=== Getting latest deployment ID ==="
          DEPLOYMENTS=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/ai-student-survival/deployments?per_page=5&order_by=created_at" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")
          DEPLOYMENT_ID=$(echo "$DEPLOYMENTS" | grep -o '"id": "[a-f0-9-]*"' | head -1 | sed 's/"id": "//;s/"//')
          echo "Latest deployment: $DEPLOYMENT_ID"

          echo "=== Trying to update custom hostname binding ==="
          CH_RESPONSE=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/ai-student-survival/custom-hostnames" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")
          echo "Custom hostname response: $(echo "$CH_RESPONSE" | head -c 500)"
          CH_ID=$(echo "$CH_RESPONSE" | grep -o '"id": "[^"]*"' | head -1 | sed 's/"id": "//;s/"//')
          echo "Custom hostname ID: ${CH_ID:-'(not found - may need Dashboard update)'}"

          if [ -n "$CH_ID" ]; then
            echo "Updating custom hostname binding to deployment $DEPLOYMENT_ID..."
            CH_UPDATE=$(curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/ai-student-survival/custom-hostnames/$CH_ID" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"deployment_id\":\"$DEPLOYMENT_ID\"}")
            echo "Result: $(echo "$CH_UPDATE" | head -c 300)"
            if echo "$CH_UPDATE" | grep -q '"success": true'; then
              echo "✅ Custom hostname binding updated!"
            else
              echo "⚠️ Custom hostname update failed"
            fi
          else
            echo "⚠️ Custom hostname ID not found via API. Please update production deployment manually in Cloudflare Dashboard if needed."
          fi

          echo "=== Getting Zone ID for cache purge ==="
          ZONE_ID="${{ secrets.CLOUDFLARE_ZONE_ID }}"
          if [ -z "$ZONE_ID" ]; then
            ZONE_RESP=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=mi-to-ai.com" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json")
            ZONE_ID=$(echo "$ZONE_RESP" | grep -o '"id": "[^"]*"' | head -1 | sed 's/"id": "//;s/"//')
          fi
          if [ -z "$ZONE_ID" ]; then
            ZONE_ALL=$(curl -s "https://api.cloudflare.com/client/v4/zones" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json")
            ZONE_ID=$(echo "$ZONE_ALL" | grep -o '"id": "[^"]*"' | head -1 | sed 's/"id": "//;s/"//')
          fi
          echo "Zone ID: ${ZONE_ID:-'(not available)'}"

          if [ -n "$ZONE_ID" ]; then
            echo "=== Purging CDN cache ==="
            PURGE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"purge_everything": true}')
            echo "Purge result: $(echo "$PURGE" | head -c 300)"
            if echo "$PURGE" | grep -q '"success": true'; then
              echo "✅ CDN cache purged!"
            else
              echo "⚠️ CDN purge failed (non-critical - cache will update within minutes)"
            fi
          fi

          echo ""
          echo "🎉 Deployment complete! mi-to-ai.com should serve the new build shortly."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm run check || true

      - name: Build
        run: pnpm run build
