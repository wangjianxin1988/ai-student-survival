name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_PROJECT_NAME: ai-student-survival

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Clear build cache
        run: rm -rf .astro .vite dist node_modules/.vite

      - name: Build
        run: pnpm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.PUBLIC_TURNSTILE_SITE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FORCE_DEMO_AUTH: ${{ vars.FORCE_DEMO_AUTH || 'false' }}

      - name: Upload to Cloudflare Pages
        id: upload
        run: |
          pnpm exec wrangler pages publish dist --project-name=ai-student-survival --branch=production --commit-message="${{ github.sha }}" 2>&1 | tee /tmp/wrangler.log
          DEPLOY_URL=$(grep -o 'https://[^ ]*\.pages\.dev' /tmp/wrangler.log | tail -1)
          echo "deploy_url=${DEPLOY_URL}" >> $GITHUB_OUTPUT
          echo "Uploaded deployment: ${DEPLOY_URL}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Update production domain
        run: |
          echo "Fetching latest deployment ID..."
          RESPONSE=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/ai-student-survival/deployments?per_page=1&order_by=created_at" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")
          echo "API Response: $RESPONSE"
          DEPLOYMENT_ID=$(echo "$RESPONSE" | grep -o '"id":"[a-f0-9-]*"' | head -1 | sed 's/"id":"//;s/"//')
          echo "Latest deployment ID: $DEPLOYMENT_ID"

          if [ -n "$DEPLOYMENT_ID" ]; then
            echo "Updating production domain to deployment $DEPLOYMENT_ID..."
            UPDATE=$(curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/ai-student-survival" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"deployment_configs\":{\"production\":{\"selected_deployment_id\":\"$DEPLOYMENT_ID\"}}}")
            echo "Update result: $UPDATE"

            if echo "$UPDATE" | grep -q '"success":true'; then
              echo "✅ SUCCESS: Production domain (mi-to-ai.com) is now serving the latest build!"
            else
              echo "⚠️ Update may have failed. Check the response above."
            fi
          else
            echo "❌ Could not find deployment ID from API response"
            echo "Response: $RESPONSE"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm run check || true

      - name: Build
        run: pnpm run build
