name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install

      - name: Run lint
        run: pnpm lint || true

      - name: Build
        run: pnpm build

      - name: Install wrangler v4
        run: npm install -g wrangler@latest

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy dist --project-name=mi-to-ai-new --branch=main --commit-dirty=true

  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm check || true

      - name: Build
        run: pnpm build
