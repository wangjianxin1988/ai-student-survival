name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_PROJECT_NAME: ai-student-survival

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Clear build cache
        run: rm -rf .astro .vite dist node_modules/.vite

      - name: Build
        run: pnpm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.PUBLIC_TURNSTILE_SITE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FORCE_DEMO_AUTH: ${{ vars.FORCE_DEMO_AUTH || 'false' }}

      - name: Check current production deployment
        id: check_production
        run: |
          echo "Fetching current project config to check production deployment..."
          CONFIG=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/ai-student-survival" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")
          echo "Project config: $(echo "$CONFIG" | head -c 1000)"
          CUR_DEPLOY=$(echo "$CONFIG" | grep -o '"selected_deployment_id": "[^"]*"' | sed 's/"selected_deployment_id": "//;s/"//')
          echo "Current selected_deployment_id: ${CUR_DEPLOY:-'(not set)'}"
          echo "current_deployment=${CUR_DEPLOY}" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload to Cloudflare Pages
        run: |
          echo "Uploading build to Cloudflare Pages..."
          pnpm exec wrangler pages publish dist --project-name=ai-student-survival --branch=production --commit-message="${{ github.sha }}" 2>&1 | tee /tmp/wrangler.log
          echo "upload_done=true" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Update and purge CDN
        run: |
          echo "Getting latest deployment ID..."
          DEPLOYMENTS=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/ai-student-survival/deployments?per_page=5&order_by=created_at" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")
          DEPLOYMENT_ID=$(echo "$DEPLOYMENTS" | grep -o '"id": "[a-f0-9-]*"' | head -1 | sed 's/"id": "//;s/"//')
          echo "Latest deployment: $DEPLOYMENT_ID"

          echo "Getting Cloudflare Zone ID..."
          ZONE_RESP=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=mi-to-ai.com" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")
          echo "Zone API response: $(echo "$ZONE_RESP" | head -c 500)"
          ZONE_ID=$(echo "$ZONE_RESP" | grep -o '"id": "[^"]*"' | head -1 | sed 's/"id": "//;s/"//')
          if [ -z "$ZONE_ID" ]; then
            ZONE_RESP2=$(curl -s "https://api.cloudflare.com/client/v4/zones" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json")
            echo "All zones response: $(echo "$ZONE_RESP2" | head -c 500)"
            ZONE_ID=$(echo "$ZONE_RESP2" | grep -o '"id": "[^"]*"' | head -1 | sed 's/"id": "//;s/"//')
          fi
          if [ -z "$ZONE_ID" ]; then
            echo "⚠️ Zone ID not found. Using CLOUDFLARE_ZONE_ID from secrets if available."
            ZONE_ID="${{ secrets.CLOUDFLARE_ZONE_ID }}"
          fi
          echo "Zone ID: $ZONE_ID"

          echo "Updating production deployment to: $DEPLOYMENT_ID..."
          UPDATE=$(curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/ai-student-survival" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"deployment_configs\":{\"production\":{\"selected_deployment_id\":\"$DEPLOYMENT_ID\"}}}")
          echo "Update result: $(echo "$UPDATE" | head -c 200)"

          if [ -n "$ZONE_ID" ]; then
            echo "Purging CDN cache for mi-to-ai.com (zone: $ZONE_ID)..."
            PURGE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"purge_everything": true}')
            echo "Purge result: $PURGE"
            if echo "$PURGE" | grep -q '"success": true'; then
              echo "✅ CDN cache purged!"
            else
              echo "⚠️ CDN purge failed or zone not found (non-critical)"
            fi
          else
            echo "⚠️ Could not get zone ID - CDN purge skipped"
          fi

          echo ""
          echo "✅ Deployment pipeline complete!"
          echo "   mi-to-ai.com should serve new build within 1-3 minutes."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm run check || true

      - name: Build
        run: pnpm run build
