name: Set SMTP
on:
  push:
    branches: [master]
jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure SMTP via API
        run: |
          echo "=== Checking current SMTP config ==="
          CURRENT=$(curl -s "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/config/auth" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}")
          echo "Current SMTP: $(echo $CURRENT | python3 -c "import sys,json; d=json.load(sys.stdin); print('host='+d.get('smtp_host','EMPTY')+' port='+str(d.get('smtp_port','')))")"
          
          if echo "$CURRENT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('SET' if d.get('smtp_host') else 'EMPTY')" | grep -q EMPTY; then
            echo "=== SMTP not configured, configuring now ==="
            RESP=$(curl -s -w "\n%{http_code}" -X POST \
              "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/config/smtp" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"host\": \"smtp.resend.com\",
                \"port\": 587,
                \"user\": \"resend\",
                \"password\": \"\${{ secrets.RESEND_API_KEY }}\",
                \"sender_email\": \"noreply@mi-to-ai.com\",
                \"sender_name\": \"MI TO AI\"
              }")
            HTTP_CODE=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | head -1)
            echo "SMTP config HTTP: $HTTP_CODE"
            echo "SMTP config response: $BODY"
          else
            echo "=== SMTP already configured ==="
          fi
          
          echo "=== Verifying SMTP config ==="
          FINAL=$(curl -s "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/config/auth" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}")
          echo "Final SMTP: $(echo $FINAL | python3 -c "import sys,json; d=json.load(sys.stdin); print('host='+d.get('smtp_host','EMPTY')+' port='+str(d.get('smtp_port','')))")"
