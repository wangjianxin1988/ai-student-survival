# One-time workflow to set SUPABASE_SERVICE_ROLE_KEY as a Cloudflare Pages secret
# Uses SUPABASE_PAT from GitHub secrets to retrieve the current service role key
# via Supabase Management API, then uploads it to Cloudflare Pages.

name: Seed Cloudflare Pages Secret

on:
  workflow_dispatch:

jobs:
  get-and-upload-secret:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Get and upload service role key
        env:
          SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Fetching service role key from Supabase Management API..."
          RESPONSE=$(curl -s -X GET \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/api_keys" \
            -H "Authorization: Bearer $SUPABASE_PAT" \
            -H "Content-Type: application/json")

          echo "API response: $RESPONSE"

          # Extract the service role key
          SERVICE_KEY=$(echo "$RESPONSE" | node -e "
            const chunks = [];
            process.stdin.on('data', d => chunks.push(d));
            process.stdin.on('end', () => {
              const data = JSON.parse(Buffer.concat(chunks).toString());
              // Try different response formats
              let key = null;
              if (Array.isArray(data)) {
                const sk = data.find(k => k.name === 'service_role_key');
                key = sk?.api_key || null;
              } else if (data.service_role_key) {
                key = data.service_role_key;
              } else if (data.serviceRoleKey) {
                key = data.serviceRoleKey;
              } else {
                const keys = Object.keys(data);
                console.error('Available keys:', JSON.stringify(keys));
              }
              if (key) {
                process.stdout.write(key);
              }
            });
          " 2>&1)

          if [ -z "$SERVICE_KEY" ]; then
            echo "Failed to extract service role key"
            exit 1
          fi

          echo "✅ Got service role key, length: ${#SERVICE_KEY}"

          # Create JSON for wrangler (multiline needs careful handling)
          # Use printf %s to avoid issues with special characters
          printf '%s\n' "{\"SUPABASE_SERVICE_ROLE_KEY\": \"$SERVICE_KEY\"}" > /tmp/secrets.json

          echo "Uploading to Cloudflare Pages..."
          wrangler pages secret bulk /tmp/secrets.json --project-name ai-student-survival
          rm -f /tmp/secrets.json
          echo "✅ SUPABASE_SERVICE_ROLE_KEY uploaded to Cloudflare Pages!"
