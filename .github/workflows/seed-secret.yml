# One-time workflow to set SUPABASE_SERVICE_ROLE_KEY as a Cloudflare Pages secret
# Uses the CI environment's SUPABASE_SERVICE_ROLE_KEY GitHub Actions secret
# and uploads it to Cloudflare Pages runtime via wrangler bulk command
#
# Usage: Go to GitHub Actions > "Seed Cloudflare Pages Secret" > Run workflow

name: Seed Cloudflare Pages Secret

on:
  workflow_dispatch:

jobs:
  upload-secret:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Upload SUPABASE_SERVICE_ROLE_KEY to Cloudflare Pages
        env:
          SECRET_VALUE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Use jq to safely create JSON with the secret value
          echo "$SECRET_VALUE" | jq -Rs '{SUPABASE_SERVICE_ROLE_KEY: .}' > /tmp/secrets.json
          cat /tmp/secrets.json
          wrangler pages secret bulk /tmp/secrets.json --project-name ai-student-survival
          rm -f /tmp/secrets.json
          echo "✅ Done! SUPABASE_SERVICE_ROLE_KEY is now set in Cloudflare Pages."
