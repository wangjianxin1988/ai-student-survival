name: Verify Secrets
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret lengths
        run: |
          echo "PUBLIC_SUPABASE_URL length: ${#PUBLIC_SUPABASE_URL}"
          echo "PUBLIC_SUPABASE_ANON_KEY length: ${#PUBLIC_SUPABASE_ANON_KEY}"
          echo "SUPABASE_SERVICE_ROLE_KEY length: ${#SUPABASE_SERVICE_ROLE_KEY}"
          echo "RESEND_API_KEY length: ${#RESEND_API_KEY}"
          echo "---"
          echo "ANON_KEY first 20: ${PUBLIC_SUPABASE_ANON_KEY:0:20}"
          echo "ANON_KEY last 10: ${PUBLIC_SUPABASE_ANON_KEY: -10}"
          echo "SR_KEY first 20: ${SUPABASE_SERVICE_ROLE_KEY:0:20}"
          echo "SR_KEY last 10: ${SUPABASE_SERVICE_ROLE_KEY: -10}"
          echo "RESEND first 10: ${RESEND_API_KEY:0:10}"
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
