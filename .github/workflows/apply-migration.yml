name: Apply Database Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply public_leaderboard migration via Management API
        run: |
          echo "Applying public_leaderboard migration to Supabase..."
          SQL_RAW=$(cat supabase/migrations/20260526_add_public_leaderboard.sql)
          SQL_JSON=$(printf '%s' "$SQL_RAW" | jq -Rs .)
          RESPONSE=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $SQL_JSON}")
          echo "Response: $RESPONSE"
          if echo "$RESPONSE" | grep -qi "error"; then
            echo "Migration may have issues: $RESPONSE"
          else
            echo "Migration applied successfully"
          fi

      - name: Verify public_leaderboard view exists
        run: |
          echo "=== Verify public_leaderboard view ==="
          RESULT=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"SELECT COUNT(*) as count FROM public_leaderboard;"}')
          echo "public_leaderboard count: $RESULT"

      - name: Verify user_points_balance table exists
        run: |
          echo "=== Verify user_points_balance table ==="
          RESULT=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"SELECT COUNT(*) as count FROM user_points_balance;"}')
          echo "user_points_balance count: $RESULT"
