name: Apply Database Migration

on:
  workflow_dispatch:
  repository_dispatch:
    types: [apply-migration]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run each SQL statement
        run: |
          # Step 1: Create user_points_balance table
          echo "=== Creating user_points_balance table ==="
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"CREATE TABLE IF NOT EXISTS user_points_balance (user_id UUID PRIMARY KEY REFERENCES auth.users(id) ON DELETE CASCADE, balance INTEGER DEFAULT 0 NOT NULL, total_earned INTEGER DEFAULT 0 NOT NULL, total_spent INTEGER DEFAULT 0 NOT NULL, updated_at TIMESTAMPTZ DEFAULT NOW() NOT NULL);"}')
          echo "Result: $RESP"

          # Step 2: Create points_transactions table
          echo "=== Creating points_transactions table ==="
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"CREATE TABLE IF NOT EXISTS points_transactions (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), user_id UUID NOT NULL REFERENCES auth.users(id) ON DELETE CASCADE, amount INTEGER NOT NULL, type TEXT NOT NULL, description TEXT, reference_id TEXT, created_at TIMESTAMPTZ DEFAULT NOW() NOT NULL);"}')
          echo "Result: $RESP"

          # Step 3: Create public_leaderboard view
          echo "=== Creating public_leaderboard view ==="
          SQL_VIEW=$(cat <<'VIEWEOF'
CREATE OR REPLACE VIEW public_leaderboard AS
SELECT
  upb.user_id,
  upb.balance,
  upb.total_earned,
  upb.updated_at,
  u.raw_user_meta_data->>'name' as name,
  u.raw_user_meta_data->>'avatar_url' as avatar
FROM user_points_balance upb
LEFT JOIN auth.users u ON u.id = upb.user_id
WHERE upb.balance > 0
ORDER BY upb.balance DESC;
VIEWEOF
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(printf '%s' "$SQL_VIEW" | jq -Rs .)}")
          echo "Result: $RESP"

          # Step 4: Policy on public_leaderboard view
          echo "=== Creating public_leaderboard policy ==="
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"DROP POLICY IF EXISTS \"Allow public read of public_leaderboard\" ON public_leaderboard; CREATE POLICY \"Allow public read of public_leaderboard\" ON public_leaderboard FOR SELECT USING (true);"}')
          echo "Result: $RESP"

          # Step 5: Policy on user_points_balance
          echo "=== Creating user_points_balance policy ==="
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"DROP POLICY IF EXISTS \"Allow public read for positive balance\" ON user_points_balance; CREATE POLICY \"Allow public read for positive balance\" ON user_points_balance FOR SELECT USING (balance > 0);"}')
          echo "Result: $RESP"

          # Step 6: Users public read policy
          echo "=== Creating users public read policy ==="
          SQL_USERS=$(cat <<'USEREOF'
DO $$
BEGIN
  IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename = 'users' AND policyname = 'Allow public read of user profiles') THEN
    ALTER TABLE users ENABLE ROW LEVEL SECURITY;
    CREATE POLICY "Allow public read of user profiles" ON users FOR SELECT USING (true);
  END IF;
END
$$;
USEREOF
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(printf '%s' "$SQL_USERS" | jq -Rs .)}")
          echo "Result: $RESP"

          # Step 7: Create post_likes table
          echo "=== Creating post_likes table ==="
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"CREATE TABLE IF NOT EXISTS post_likes (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), post_id UUID NOT NULL REFERENCES community_posts(id) ON DELETE CASCADE, user_id UUID NOT NULL REFERENCES auth.users(id) ON DELETE CASCADE, created_at TIMESTAMPTZ DEFAULT NOW() NOT NULL, UNIQUE(post_id, user_id));"}')
          echo "Result: $RESP"

          # Step 8: Create post_favorites table
          echo "=== Creating post_favorites table ==="
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"CREATE TABLE IF NOT EXISTS post_favorites (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), post_id UUID NOT NULL REFERENCES community_posts(id) ON DELETE CASCADE, user_id UUID NOT NULL REFERENCES auth.users(id) ON DELETE CASCADE, created_at TIMESTAMPTZ DEFAULT NOW() NOT NULL, UNIQUE(post_id, user_id));"}')
          echo "Result: $RESP"

          # Step 9: Create post_comments table
          echo "=== Creating post_comments table ==="
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"CREATE TABLE IF NOT EXISTS post_comments (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), post_id UUID NOT NULL REFERENCES community_posts(id) ON DELETE CASCADE, user_id UUID NOT NULL REFERENCES auth.users(id) ON DELETE CASCADE, content TEXT NOT NULL, parent_id UUID REFERENCES post_comments(id) ON DELETE CASCADE, likes_count INTEGER DEFAULT 0, status VARCHAR(20) DEFAULT '\''published'\'', created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ DEFAULT NOW());"}')
          echo "Result: $RESP"

          # Step 10: Create points balance trigger function
          echo "=== Creating update_points_balance_on_transaction function ==="
          FUNC=$(cat <<'FUNCEOF'
CREATE OR REPLACE FUNCTION update_points_balance_on_transaction() RETURNS TRIGGER AS $$ DECLARE v_new_balance INTEGER; v_new_earned INTEGER := 0; v_new_spent INTEGER := 0; BEGIN IF TG_OP = 'INSERT' THEN SELECT COALESCE(balance, 0), COALESCE(total_earned, 0), COALESCE(total_spent, 0) INTO v_new_balance, v_new_earned, v_new_spent FROM user_points_balance WHERE user_id = NEW.user_id; v_new_balance := v_new_balance + NEW.amount; IF NEW.amount >= 0 THEN v_new_earned := v_new_earned + NEW.amount; ELSE v_new_spent := v_new_spent + ABS(NEW.amount); END IF; INSERT INTO user_points_balance (user_id, balance, total_earned, total_spent) VALUES (NEW.user_id, v_new_balance, v_new_earned, v_new_spent) ON CONFLICT (user_id) DO UPDATE SET balance = user_points_balance.balance + NEW.amount, total_earned = CASE WHEN NEW.amount >= 0 THEN user_points_balance.total_earned + NEW.amount ELSE user_points_balance.total_earned END, total_spent = CASE WHEN NEW.amount < 0 THEN user_points_balance.total_spent + ABS(NEW.amount) ELSE user_points_balance.total_spent END, updated_at = NOW(); RETURN NEW; END IF; RETURN NEW; END; $$ LANGUAGE plpgsql SECURITY DEFINER;
FUNCEOF
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(printf '%s' "$FUNC" | jq -Rs .)}")
          echo "Result: $RESP"

          # Step 11: Create trigger on points_transactions
          echo "=== Creating points trigger ==="
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"DROP TRIGGER IF EXISTS trigger_update_points_balance ON points_transactions; CREATE TRIGGER trigger_update_points_balance AFTER INSERT ON points_transactions FOR EACH ROW EXECUTE FUNCTION update_points_balance_on_transaction();"}')
          echo "Result: $RESP"

          # Step 12: RLS policies for post_likes
          echo "=== Creating post_likes RLS policies ==="
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"DROP POLICY IF EXISTS \"Allow public read of post_likes\" ON post_likes; CREATE POLICY \"Allow public read of post_likes\" ON post_likes FOR SELECT USING (true); DROP POLICY IF EXISTS \"Allow authenticated insert of post_likes\" ON post_likes; CREATE POLICY \"Allow authenticated insert of post_likes\" ON post_likes FOR INSERT WITH CHECK (auth.uid() = user_id); DROP POLICY IF EXISTS \"Allow owner delete post_likes\" ON post_likes; CREATE POLICY \"Allow owner delete post_likes\" ON post_likes FOR DELETE USING (auth.uid() = user_id);"}')
          echo "Result: $RESP"

          # Step 13: RLS policies for post_favorites
          echo "=== Creating post_favorites RLS policies ==="
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"DROP POLICY IF EXISTS \"Allow public read of post_favorites\" ON post_favorites; CREATE POLICY \"Allow public read of post_favorites\" ON post_favorites FOR SELECT USING (true); DROP POLICY IF EXISTS \"Allow authenticated insert of post_favorites\" ON post_favorites; CREATE POLICY \"Allow authenticated insert of post_favorites\" ON post_favorites FOR INSERT WITH CHECK (auth.uid() = user_id); DROP POLICY IF EXISTS \"Allow owner delete post_favorites\" ON post_favorites; CREATE POLICY \"Allow owner delete post_favorites\" ON post_favorites FOR DELETE USING (auth.uid() = user_id);"}')
          echo "Result: $RESP"

          # Step 14: RLS policies for post_comments
          echo "=== Creating post_comments RLS policies ==="
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"DROP POLICY IF EXISTS \"Allow public read of post_comments\" ON post_comments; CREATE POLICY \"Allow public read of post_comments\" ON post_comments FOR SELECT USING (true); DROP POLICY IF EXISTS \"Allow authenticated insert of post_comments\" ON post_comments; CREATE POLICY \"Allow authenticated insert of post_comments\" ON post_comments FOR INSERT WITH CHECK (auth.uid() = user_id); DROP POLICY IF EXISTS \"Allow owner delete post_comments\" ON post_comments; CREATE POLICY \"Allow owner delete post_comments\" ON post_comments FOR DELETE USING (auth.uid() = user_id);"}')
          echo "Result: $RESP"

          # Step 15: Grants
          echo "=== Granting permissions ==="
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"GRANT USAGE ON SCHEMA public TO anon; GRANT SELECT ON public_leaderboard TO anon; GRANT SELECT ON user_points_balance TO anon; GRANT SELECT, INSERT, DELETE ON post_likes TO anon; GRANT SELECT, INSERT, DELETE ON post_favorites TO anon; GRANT SELECT, INSERT, DELETE ON post_comments TO anon;"}')
          echo "Result: $RESP"

          # Step 16: Indexes
          echo "=== Creating indexes ==="
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"CREATE INDEX IF NOT EXISTS idx_post_likes_post_id ON post_likes(post_id); CREATE INDEX IF NOT EXISTS idx_post_likes_user_id ON post_likes(user_id); CREATE INDEX IF NOT EXISTS idx_post_favorites_post_id ON post_favorites(post_id); CREATE INDEX IF NOT EXISTS idx_post_favorites_user_id ON post_favorites(user_id); CREATE INDEX IF NOT EXISTS idx_post_comments_post_id ON post_comments(post_id); CREATE INDEX IF NOT EXISTS idx_post_comments_user_id ON post_comments(user_id);"}')
          echo "Result: $RESP"

          # Step 17: Count RPC functions (for like/favorite denormalized counts)
          echo "=== Creating count RPC functions ==="
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"CREATE OR REPLACE FUNCTION increment_likes_count(post_id UUID) RETURNS VOID AS $$ BEGIN UPDATE community_posts SET likes_count = likes_count + 1 WHERE id = post_id; END; $$ LANGUAGE plpgsql SECURITY DEFINER;"}')
          echo "Result: $RESP"
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"CREATE OR REPLACE FUNCTION decrement_likes_count(post_id UUID) RETURNS VOID AS $$ BEGIN UPDATE community_posts SET likes_count = GREATEST(likes_count - 1, 0) WHERE id = post_id; END; $$ LANGUAGE plpgsql SECURITY DEFINER;"}')
          echo "Result: $RESP"
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"CREATE OR REPLACE FUNCTION increment_favorites_count(post_id UUID) RETURNS VOID AS $$ BEGIN UPDATE community_posts SET favorites_count = favorites_count + 1 WHERE id = post_id; END; $$ LANGUAGE plpgsql SECURITY DEFINER;"}')
          echo "Result: $RESP"
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"CREATE OR REPLACE FUNCTION decrement_favorites_count(post_id UUID) RETURNS VOID AS $$ BEGIN UPDATE community_posts SET favorites_count = GREATEST(favorites_count - 1, 0) WHERE id = post_id; END; $$ LANGUAGE plpgsql SECURITY DEFINER;"}')
          echo "Result: $RESP"

          # Step 18: Grant execute on RPC functions
          echo "=== Granting execute on RPC functions ==="
          RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"GRANT EXECUTE ON FUNCTION increment_likes_count(UUID) TO anon; GRANT EXECUTE ON FUNCTION decrement_likes_count(UUID) TO anon; GRANT EXECUTE ON FUNCTION increment_favorites_count(UUID) TO anon; GRANT EXECUTE ON FUNCTION decrement_favorites_count(UUID) TO anon;"}')
          echo "Result: $RESP"

      - name: Verify public_leaderboard view
        run: |
          RESULT=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"SELECT count(*) as cnt FROM public_leaderboard;"}')
          echo "public_leaderboard: $RESULT"

      - name: Verify user_points_balance table
        run: |
          RESULT=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"SELECT count(*) as cnt FROM user_points_balance;"}')
          echo "user_points_balance: $RESULT"

