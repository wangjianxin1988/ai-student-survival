name: Supabase Setup

on:
  workflow_dispatch:

jobs:
  configure-supabase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Supabase Auth Settings
        run: |
          echo "=== Step 1: Set Site URL and OAuth redirect URLs ==="
          AUTH_RESP=$(curl -s -X PATCH \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/config/auth" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"siteUrl": "https://mi-to-ai.com", "uriAllowList": "https://mi-to-ai.com/auth/callback,https://mi-to-ai.com/**,http://localhost:3000/**"}')
          echo "Auth config response: $AUTH_RESP"

      - name: SMTP Configuration Note
        run: |
          echo "=== SMTP Configuration (Manual Step) ==="
          echo "To enable email verification and password reset emails:"
          echo "1. Go to: https://supabase.com/dashboard/project/giynvpfnzzelzwpmsgtf/auth/templates"
          echo "2. Or: https://supabase.com/dashboard/project/giynvpfnzzelzwpmsgtf/settings/auth"
          echo "3. Configure SMTP with your email provider (Resend recommended)"
          echo ""
          echo "For Resend SMTP:"
          echo "  Host: smtp.resend.com"
          echo "  Port: 587 (TLS) or 465 (SSL)"
          echo "  User: resend"
          echo "  Password: Your Resend API Key"
          echo "  Sender: noreply@mi-to-ai.com"
          echo ""
          echo "Current: mailer_autoconfirm=true (immediate login, no email verification)"
          echo "After SMTP setup: Set mailer_autoconfirm=false to require email verification"

      - name: Create contact_messages table
        run: |
          echo "=== Step 2: Create contact_messages table ==="
          SQL=$(printf '%s ' \
            "CREATE TABLE IF NOT EXISTS contact_messages (" \
            "id UUID PRIMARY KEY DEFAULT gen_random_uuid()," \
            "name VARCHAR(255) NOT NULL," \
            "email VARCHAR(255) NOT NULL," \
            "type VARCHAR(20) NOT NULL CHECK (type IN ('feedback','bug','feature','other'))," \
            "message TEXT NOT NULL," \
            "ip_address VARCHAR(45)," \
            "captcha_verified BOOLEAN DEFAULT false," \
            "email_sent BOOLEAN DEFAULT false," \
            "status VARCHAR(20) DEFAULT 'pending' CHECK (status IN ('pending','processed','archived'))," \
            "created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()," \
            "updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW());" \
            "CREATE INDEX IF NOT EXISTS idx_contact_messages_email ON contact_messages(email);" \
            "CREATE INDEX IF NOT EXISTS idx_contact_messages_type ON contact_messages(type);" \
            "CREATE INDEX IF NOT EXISTS idx_contact_messages_status ON contact_messages(status);" \
            "CREATE INDEX IF NOT EXISTS idx_contact_messages_created ON contact_messages(created_at DESC);" \
            "ALTER TABLE contact_messages ENABLE ROW LEVEL SECURITY;" \
            'DROP POLICY IF EXISTS "Anyone can insert contact messages" ON contact_messages;' \
            'CREATE POLICY "Anyone can insert contact messages" ON contact_messages FOR INSERT WITH CHECK (true);')
          SQL_ESCAPED=$(echo "$SQL" | jq -Rs '{query: .}')
          DB_RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d "$SQL_ESCAPED")
          echo "DB response: $DB_RESP"
