name: Supabase Setup

on:
  workflow_dispatch:

jobs:
  configure-supabase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Supabase Site URL and OAuth Redirect URLs
        run: |
          echo "=== Step 1: Set Site URL and OAuth redirect URLs ==="
          AUTH_RESP=$(curl -s -X PATCH \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/config/auth" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"siteUrl": "https://mi-to-ai.com", "uriAllowList": "https://mi-to-ai.com/auth/callback,https://mi-to-ai.com/**,http://localhost:3000/**"}')
          echo "Auth config response: $AUTH_RESP"

      - name: Create contact_messages table
        run: |
          echo "=== Step 2: Create contact_messages table ==="
          SQL=$(cat <<'EOSQL'
CREATE TABLE IF NOT EXISTS contact_messages (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), name VARCHAR(255) NOT NULL, email VARCHAR(255) NOT NULL, type VARCHAR(20) NOT NULL CHECK (type IN ('feedback', 'bug', 'feature', 'other')), message TEXT NOT NULL, ip_address VARCHAR(45), captcha_verified BOOLEAN DEFAULT false, email_sent BOOLEAN DEFAULT false, status VARCHAR(20) DEFAULT 'pending' CHECK (status IN ('pending', 'processed', 'archived')), created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(), updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()); CREATE INDEX IF NOT EXISTS idx_contact_messages_email ON contact_messages(email); CREATE INDEX IF NOT EXISTS idx_contact_messages_type ON contact_messages(type); CREATE INDEX IF NOT EXISTS idx_contact_messages_status ON contact_messages(status); CREATE INDEX IF NOT EXISTS idx_contact_messages_created ON contact_messages(created_at DESC); ALTER TABLE contact_messages ENABLE ROW LEVEL SECURITY; CREATE POLICY "Anyone can insert contact messages" ON contact_messages FOR INSERT WITH CHECK (true);
EOSQL
          )
          # Escape for JSON: replace newlines with literal \n
          SQL_ESCAPED=$(echo "$SQL" | jq -Rs '{query: .}')
          DB_RESP=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/giynvpfnzzelzwpmsgtf/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d "$SQL_ESCAPED")
          echo "DB response: $DB_RESP"
