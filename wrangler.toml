# Cloudflare Pages Configuration
# Note: For Cloudflare Pages deployments via GitHub Actions,
# environment variables are set via: wrangler pages secret put
# Headers are configured in Cloudflare Dashboard > Pages > Settings > Headers

name = "ai-student-survival"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# Cloudflare Pages 环境变量设置说明
# 1. 使用 wrangler CLI: wrangler pages secret put PUBLIC_SUPABASE_URL
# 2. 或在 Cloudflare Dashboard > Pages > ai-student-survival > Settings > Environment Variables
# 获取 Supabase 凭据: https://supabase.com/dashboard > Settings > API
